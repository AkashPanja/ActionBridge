services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: doc_action_center
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/doc_action_center
      # For local dev without Docker, comment the above and uncomment:
      # DATABASE_URL: sqlite+aiosqlite:///./doc_action_center.db
    volumes:
      - ./backend:/app

volumes:
  pgdata:
