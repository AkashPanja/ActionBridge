services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: doc_action_center
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: akashpanja/actionbridge-api:latest
    # build: ./backend   # uncomment to build locally instead
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/doc_action_center
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:80,http://localhost:5173}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads

  frontend:
    image: akashpanja/actionbridge-frontend:latest
    # build: ./frontend  # uncomment to build locally instead
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
